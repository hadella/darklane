<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
{{ partial "head.html" . }}
<body>
  {{ partial "header.html" . }}

  <div class="container">
    <div class="main-content">
      <!-- Main content area - filled by page-specific templates -->
      <div class="content-column">
        {{ block "main" . }}{{ end }}
      </div>

      <!-- Sidebar - shows on all pages -->
      <aside class="sidebar-column">
        {{ partial "sidebar.html" . }}
      </aside>
    </div>
  </div>

  {{ partial "footer.html" . }}
</body>
</html>
