<header>
    <div class="container">
        <div class="site-header">
            <!-- Site title/logo -->
            <h1 class="site-title">
                <a href="{{ .Site.BaseURL }}">{{ .Site.Title }}</a>
            </h1>

            <!-- Main navigation menu -->
            <nav>
                {{ if .Site.Menus.main }}
                <ul>
                    {{ range .Site.Menus.main }}
                    <li>
                        <a href="{{ .URL | relURL }}">{{ .Name }}</a>
                    </li>
                    {{ end }}
                </ul>
                {{ end }}
            </nav>
        </div>
    </div>
</header>
