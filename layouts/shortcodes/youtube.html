{{- $id := .Get 0 -}} {{- $title := .Get "title" | default "YouTube video" -}}

<div class="youtube-embed">
    <iframe
        src="https://www.youtube.com/embed/{{ $id }}"
        title="{{ $title }}"
        allow="
            accelerometer;
            autoplay;
            clipboard-write;
            encrypted-media;
            gyroscope;
            picture-in-picture;
        "
        allowfullscreen
    >
    </iframe>
</div>
