{{- $src := .Get "src" -}} {{- $width := .Get "width" | default "800" -}} {{-
$caption := .Get "caption" -}} {{- $alt := .Get "alt" | default $caption |
default "" -}}

<figure class="img-figure" style="--img-width: {{ $width }}px;">
    <img src="{{ $src }}" alt="{{ $alt }}" />
    {{- if $caption -}}
    <figcaption>{{ $caption }}</figcaption>
    {{- end -}}
</figure>
