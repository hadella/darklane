{{- $id := .Get "id" | default (printf "tabs-%d" now.Unix) -}}

<div class="tab-group" id="{{ $id }}">
    <div class="tab-buttons">
        <!-- Tab buttons will be generated by JavaScript -->
    </div>
    <div class="tab-content">{{ .Inner }}</div>
</div>

<script>
    (function () {
        const tabGroup = document.getElementById("{{ $id }}");
        const buttons = tabGroup.querySelector(".tab-buttons");
        const content = tabGroup.querySelector(".tab-content");
        const tabs = content.querySelectorAll(".tab-pane");

        // Generate tab buttons
        tabs.forEach((tab, index) => {
            const title = tab.getAttribute("data-title") || `Tab ${index + 1}`;
            const btn = document.createElement("button");
            btn.textContent = title;
            btn.className = "tab-btn";

            if (index === 0) {
                btn.classList.add("active");
                tab.style.display = "block";
            } else {
                tab.style.display = "none";
            }

            btn.addEventListener("click", () => {
                // Deactivate all tabs
                buttons
                    .querySelectorAll(".tab-btn")
                    .forEach((b) => b.classList.remove("active"));
                tabs.forEach((t) => (t.style.display = "none"));

                // Activate clicked tab
                btn.classList.add("active");
                tab.style.display = "block";
            });

            buttons.appendChild(btn);
        });
    })();
</script>
