tags = ["blog", "dark", "technical", "minimal", "clean", "modern"]
features = ["syntax-highlighting", "latex", "responsive", "shortcodes", "css-variables"]
min_version = "0.112.0"

[author]
  name = "Justin Hadella"
  homepage = "https://github.com/hadella"

